services:
  - type: web
    name: veso-ai-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: NVIDIA_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: NEXTJS_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: ENVIRONMENT
        value: production
